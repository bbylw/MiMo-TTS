<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mimo-v2.5-tts-voicedesign</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-4xl mx-auto p-4 space-y-4">
    <nav class="text-sm text-slate-300 flex gap-3">
      <a href="index.html" class="underline">首页</a>
      <a href="tts.html" class="underline">Built-in TTS</a>
      <a href="voiceclone.html" class="underline">VoiceClone</a>
    </nav>

    <h1 class="text-2xl font-bold">mimo-v2.5-tts-voicedesign</h1>
    <p class="text-slate-400 text-sm">官方规则：user 必填（音色描述）；不支持内置音色、不支持唱歌。</p>

    <section class="bg-slate-900 border border-slate-700 rounded p-4 space-y-3">
      <input id="text" class="w-full rounded bg-slate-800 border border-slate-700 p-2" placeholder="输入要朗读的文本（assistant）" />
      <textarea id="voiceDesc" class="w-full h-24 rounded bg-slate-800 border border-slate-700 p-2" placeholder="音色描述（必填）：例如 20岁东北女声，口齿清晰，情绪积极。"></textarea>
      <textarea id="userInstruction" class="w-full h-20 rounded bg-slate-800 border border-slate-700 p-2" placeholder="额外朗读要求（可选）：如语速、停顿、情绪变化。"></textarea>

      <div class="grid sm:grid-cols-2 gap-3">
        <select id="dialect" class="rounded bg-slate-800 border border-slate-700 p-2">
          <option value="">方言（可选）</option>
          <option value="东北话">东北话</option><option value="四川话">四川话</option>
          <option value="河南话">河南话</option><option value="粤语">粤语</option><option value="台湾腔">台湾腔</option>
        </select>
        <select id="format" class="rounded bg-slate-800 border border-slate-700 p-2">
          <option value="wav">wav</option><option value="mp3">mp3</option><option value="pcm16">pcm16</option>
        </select>
      </div>

      <p class="text-xs text-amber-300">方言将作为 user 指令生效（不是内置音色标签）。</p>
      <button onclick="generate()" class="px-4 py-2 bg-emerald-600 rounded">生成</button>
      <p id="msg" class="text-sm text-slate-400"></p>
      <audio id="player" controls class="w-full"></audio>
    </section>
  </main>

<script>
const API_URL = 'https://api.xiaomimimo.com/v1/chat/completions';
const MODEL = 'mimo-v2.5-tts-voicedesign';

function getApiKey() { return localStorage.getItem('mimo_api_key'); }
function toBlob(base64, type) {
  const b = atob(base64), arr = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) arr[i] = b.charCodeAt(i);
  return new Blob([arr], { type });
}

async function generate() {
  const text = document.getElementById('text').value.trim();
  const voiceDesc = document.getElementById('voiceDesc').value.trim();
  const instruction = document.getElementById('userInstruction').value.trim();
  const dialect = document.getElementById('dialect').value;
  const format = document.getElementById('format').value;
  const key = getApiKey();

  if (!key) return (document.getElementById('msg').textContent = '请先在首页保存 API Key');
  if (!text) return (document.getElementById('msg').textContent = '请输入文本');
  if (!voiceDesc) return (document.getElementById('msg').textContent = 'voicedesign 的音色描述为必填');

  const parts = [`音色描述：${voiceDesc}`];
  if (instruction) parts.push(`朗读要求：${instruction}`);
  if (dialect) parts.push(`请使用${dialect}风格/口音进行朗读。`);
  const userContent = parts.join('\n');

  document.getElementById('msg').textContent = '生成中...';
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'api-key': key },
    body: JSON.stringify({
      model: MODEL,
      messages: [{ role: 'user', content: userContent }, { role: 'assistant', content: text }],
      audio: { format }
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('msg').textContent = err.error?.message || `请求失败(${res.status})`;
    return;
  }
  const data = await res.json();
  const mime = format === 'mp3' ? 'audio/mpeg' : (format === 'pcm16' ? 'audio/L16' : 'audio/wav');
  const blob = toBlob(data.choices[0].message.audio.data, mime);
  document.getElementById('player').src = URL.createObjectURL(blob);
  document.getElementById('msg').textContent = '成功';
}
</script>
</body>
</html>
