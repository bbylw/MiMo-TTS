<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiMo TTS 控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-5xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold mb-2">MiMo-V2.5-TTS 系列</h1>
    <p class="text-slate-400 mb-8">按官方文档拆分为三个独立页面，避免模型参数互相干扰。</p>

    <div class="grid md:grid-cols-3 gap-4">
      <a class="block rounded-xl border border-indigo-500/30 bg-slate-900 p-5 hover:border-indigo-400" href="tts.html">
        <h2 class="text-lg font-semibold">mimo-v2.5-tts</h2>
        <p class="text-sm text-slate-400 mt-2">内置音色 + 标签/自然语言风格控制，支持唱歌。</p>
      </a>

      <a class="block rounded-xl border border-emerald-500/30 bg-slate-900 p-5 hover:border-emerald-400" href="voicedesign.html">
        <h2 class="text-lg font-semibold">mimo-v2.5-tts-voicedesign</h2>
        <p class="text-sm text-slate-400 mt-2">通过文本描述设计音色，user 消息必填。</p>
      </a>

      <a class="block rounded-xl border border-amber-500/30 bg-slate-900 p-5 hover:border-amber-400" href="voiceclone.html">
        <h2 class="text-lg font-semibold">mimo-v2.5-tts-voiceclone</h2>
        <p class="text-sm text-slate-400 mt-2">上传 wav/mp3 样本克隆音色，不支持内置音色/唱歌。</p>
      </a>
    </div>

    <section class="mt-8 rounded-xl border border-slate-700 bg-slate-900 p-5">
      <h3 class="font-semibold mb-2">共用 API Key</h3>
      <p class="text-sm text-slate-400 mb-3">三个页面都从浏览器 localStorage 读取 <code>mimo_api_key</code>。</p>
      <div class="flex gap-2">
        <input id="apiKeyInput" type="password" placeholder="sk-..." class="flex-1 rounded bg-slate-800 border border-slate-700 px-3 py-2" />
        <button onclick="saveApiKey()" class="px-4 py-2 bg-indigo-600 rounded hover:bg-indigo-500">保存</button>
        <button onclick="clearApiKey()" class="px-4 py-2 bg-slate-700 rounded hover:bg-slate-600">清除</button>
      </div>
      <p id="status" class="text-xs text-slate-400 mt-2"></p>
    </section>
  </main>

  <script>
    function saveApiKey() {
      const v = document.getElementById('apiKeyInput').value.trim();
      if (!v.startsWith('sk-')) {
        document.getElementById('status').textContent = 'API Key 格式应以 sk- 开头';
        return;
      }
      localStorage.setItem('mimo_api_key', v);
      document.getElementById('status').textContent = '已保存';
    }

    function clearApiKey() {
      localStorage.removeItem('mimo_api_key');
      document.getElementById('status').textContent = '已清除';
      document.getElementById('apiKeyInput').value = '';
    }

    (function init() {
      const v = localStorage.getItem('mimo_api_key');
      if (v) {
        document.getElementById('status').textContent = '已检测到本地 API Key';
      }
    })();
  </script>
</body>
</html>
