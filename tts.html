<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mimo-v2.5-tts</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-4xl mx-auto p-4 space-y-4">
    <nav class="text-sm text-slate-300 flex gap-3">
      <a href="index.html" class="underline">首页</a>
      <a href="voicedesign.html" class="underline">VoiceDesign</a>
      <a href="voiceclone.html" class="underline">VoiceClone</a>
    </nav>

    <h1 class="text-2xl font-bold">mimo-v2.5-tts（内置音色）</h1>
    <p class="text-slate-400 text-sm">支持内置音色 + 自然语言控制 + assistant 标签控制（含唱歌）。</p>

    <section class="bg-slate-900 border border-slate-700 rounded p-4 space-y-3">
      <input id="text" class="w-full rounded bg-slate-800 border border-slate-700 p-2" placeholder="输入要朗读的文本" />
      <textarea id="userInstruction" class="w-full h-20 rounded bg-slate-800 border border-slate-700 p-2" placeholder="自然语言控制（可选），例如：语速稍快，语气开心。"></textarea>

      <div class="grid sm:grid-cols-3 gap-3">
        <select id="voice" class="rounded bg-slate-800 border border-slate-700 p-2">
          <option value="mimo_default">MiMo-默认</option><option value="冰糖">冰糖</option><option value="茉莉">茉莉</option>
          <option value="苏打">苏打</option><option value="白桦">白桦</option><option value="Mia">Mia</option>
          <option value="Chloe">Chloe</option><option value="Milo">Milo</option><option value="Dean">Dean</option>
        </select>

        <select id="style" class="rounded bg-slate-800 border border-slate-700 p-2">
          <option value="">默认</option><option value="开心">开心</option><option value="悲伤">悲伤</option>
          <option value="东北话">东北话</option><option value="四川话">四川话</option><option value="河南话">河南话</option>
          <option value="粤语">粤语</option><option value="台湾腔">台湾腔</option><option value="唱歌">唱歌</option>
        </select>

        <select id="format" class="rounded bg-slate-800 border border-slate-700 p-2">
          <option value="wav">wav</option><option value="mp3">mp3</option><option value="pcm16">pcm16</option>
        </select>
      </div>

      <button onclick="generate()" class="px-4 py-2 bg-indigo-600 rounded">生成</button>
      <p id="msg" class="text-sm text-slate-400"></p>
      <audio id="player" controls class="w-full"></audio>
    </section>
  </main>

<script>
const API_URL = 'https://api.xiaomimimo.com/v1/chat/completions';

function getApiKey() { return localStorage.getItem('mimo_api_key'); }
function toBlob(base64, type) {
  const b = atob(base64), arr = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) arr[i] = b.charCodeAt(i);
  return new Blob([arr], { type });
}

async function generate() {
  const text = document.getElementById('text').value.trim();
  const style = document.getElementById('style').value;
  const userInstruction = document.getElementById('userInstruction').value.trim();
  const voice = document.getElementById('voice').value;
  const format = document.getElementById('format').value;
  const key = getApiKey();
  if (!key) return (document.getElementById('msg').textContent = '请先在首页保存 API Key');
  if (!text) return (document.getElementById('msg').textContent = '请输入文本');

  const styleInstruction = style ? `请使用${style}风格/口音朗读，保持自然。` : '';
  const userContent = [userInstruction || '请自然朗读以下文本', styleInstruction].filter(Boolean).join(' ');
  const assistantContent = style ? `(${style})${text}` : text;

  document.getElementById('msg').textContent = '生成中...';
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'api-key': key },
    body: JSON.stringify({
      model: 'mimo-v2.5-tts',
      messages: [{ role: 'user', content: userContent }, { role: 'assistant', content: assistantContent }],
      audio: { format, voice }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('msg').textContent = err.error?.message || `请求失败(${res.status})`;
    return;
  }
  const data = await res.json();
  const mime = format === 'mp3' ? 'audio/mpeg' : (format === 'pcm16' ? 'audio/L16' : 'audio/wav');
  const blob = toBlob(data.choices[0].message.audio.data, mime);
  document.getElementById('player').src = URL.createObjectURL(blob);
  document.getElementById('msg').textContent = '成功';
}
</script>
</body>
</html>
