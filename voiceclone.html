<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiMo TTS · VoiceClone</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-6">
    <nav class="rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300 flex flex-wrap items-center gap-4 backdrop-blur">
      <a href="index.html" class="hover:text-white">首页</a>
      <span class="text-slate-600">/</span>
      <a href="tts.html" class="hover:text-white">Built-in TTS</a>
      <a href="voicedesign.html" class="hover:text-white">VoiceDesign</a>
      <span class="ml-auto text-xs text-amber-200 border border-amber-300/30 rounded-full px-2.5 py-1">Voice Clone</span>
    </nav>

    <header class="rounded-3xl border border-amber-400/30 bg-gradient-to-br from-slate-900 to-amber-950/70 p-7 shadow-2xl shadow-amber-950/20">
      <h1 class="text-2xl sm:text-3xl font-bold">mimo-v2.5-tts-voiceclone</h1>
      <p class="text-sm text-slate-300 mt-3">上传 wav/mp3 样本克隆音色，sample 会转成 Data URL 写入 <code>audio.voice</code>。界面已升级，上传与生成链路更直观。</p>
    </header>

    <section class="grid lg:grid-cols-3 gap-4">
      <div class="lg:col-span-2 rounded-3xl border border-white/10 bg-slate-900/70 p-5 sm:p-6 space-y-5 backdrop-blur">
        <div>
          <label class="text-sm text-slate-300">文本（assistant）</label>
          <textarea id="text" rows="7" class="mt-1.5 w-full rounded-xl bg-slate-800/85 border border-slate-700 px-3 py-2.5 outline-none focus:border-amber-400 transition" placeholder="输入要合成的文本"></textarea>
        </div>

        <div>
          <label class="text-sm text-slate-300">自然语言控制（user，可选）</label>
          <textarea id="userInstruction" rows="3" class="mt-1.5 w-full rounded-xl bg-slate-800/85 border border-slate-700 px-3 py-2.5 outline-none focus:border-amber-400 transition" placeholder="例如：语速平稳，语气自然。"></textarea>
        </div>

        <div class="grid sm:grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-slate-400">音色样本（必填，wav/mp3）</label>
            <input id="sample" type="file" accept=".wav,.mp3,audio/wav,audio/mpeg" class="mt-1.5 w-full rounded-xl bg-slate-800/85 border border-slate-700 px-3 py-2.5" />
            <p class="text-xs text-slate-400 mt-1.5">Base64 编码后不超过 10MB。</p>
          </div>
          <div>
            <label class="text-xs text-slate-400">输出格式</label>
            <select id="format" class="mt-1.5 w-full rounded-xl bg-slate-800/85 border border-slate-700 px-3 py-2.5">
              <option value="wav">wav</option><option value="mp3">mp3</option><option value="pcm16">pcm16</option>
            </select>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button id="genBtn" onclick="generate()" class="rounded-xl px-4 py-2.5 bg-amber-600 hover:bg-amber-500 disabled:opacity-60 transition">生成音频</button>
          <span id="msg" class="text-sm text-slate-300"></span>
        </div>
      </div>

      <aside class="rounded-3xl border border-white/10 bg-slate-900/70 p-5 sm:p-6 space-y-4 backdrop-blur">
        <h2 class="font-semibold">播放与下载</h2>
        <audio id="player" controls class="w-full"></audio>
        <button id="downloadBtn" onclick="downloadAudio()" class="w-full rounded-xl px-4 py-2.5 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 transition" disabled>下载音频</button>
        <p class="text-xs text-slate-400">请先在首页保存 API Key（localStorage: mimo_api_key）。</p>
      </aside>
    </section>
  </main>

<script>
const API_URL = 'https://api.xiaomimimo.com/v1/chat/completions';
const MODEL = 'mimo-v2.5-tts-voiceclone';
let currentBlob = null;

function getApiKey() { return localStorage.getItem('mimo_api_key'); }
function setMsg(t, err = false) {
  const el = document.getElementById('msg');
  el.textContent = t;
  el.className = err ? 'text-sm text-rose-300' : 'text-sm text-slate-300';
}
function normalizeBase64(s) {
  const cleaned = String(s).replace(/\s+/g, '').replace(/-/g, '+').replace(/_/g, '/');
  const pad = cleaned.length % 4;
  return pad ? cleaned + '='.repeat(4 - pad) : cleaned;
}
function base64ToBlob(base64, mimeType) {
  const b64 = normalizeBase64(base64);
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}
function extractAudioData(resp) {
  return resp?.choices?.[0]?.message?.audio?.data
    || resp?.choices?.[0]?.audio?.data
    || resp?.audio?.data
    || null;
}
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('读取样本失败'));
    r.readAsDataURL(file);
  });
}
function setLoading(v) {
  document.getElementById('genBtn').disabled = v;
  if (v) setMsg('生成中...');
}
function downloadAudio() {
  if (!currentBlob) return;
  const format = document.getElementById('format').value;
  const ext = format === 'mp3' ? 'mp3' : (format === 'pcm16' ? 'pcm' : 'wav');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(currentBlob);
  a.download = `mimo_voiceclone_${Date.now()}.${ext}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function generate() {
  const text = document.getElementById('text').value.trim();
  const userInstruction = document.getElementById('userInstruction').value.trim();
  const format = document.getElementById('format').value;
  const file = document.getElementById('sample').files[0];
  const key = getApiKey();

  if (!key) return setMsg('请先在首页保存 API Key', true);
  if (!text) return setMsg('请输入文本', true);
  if (!file) return setMsg('请上传 wav/mp3 样本', true);

  const supported = ['audio/mpeg', 'audio/mp3', 'audio/wav', 'audio/x-wav'].includes(file.type) || /\.(mp3|wav)$/i.test(file.name);
  if (!supported) return setMsg('样本仅支持 wav/mp3', true);

  try {
    setLoading(true);
    const voiceData = await readAsDataURL(file);
    const base64Data = String(voiceData).split(',')[1] || '';
    if (base64Data.length > 10 * 1024 * 1024) throw new Error('样本 Base64 超过 10MB');

    const payload = {
      model: MODEL,
      messages: [
        { role: 'user', content: userInstruction || '请自然朗读以下文本' },
        { role: 'assistant', content: text }
      ],
      audio: { format, voice: voiceData }
    };

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'api-key': key },
      body: JSON.stringify(payload)
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error?.message || `请求失败(${res.status})`);

    const audioData = extractAudioData(data);
    if (!audioData) throw new Error('接口返回成功但未包含音频数据，请检查账号权限/模型输入。');

    const mime = format === 'mp3' ? 'audio/mpeg' : (format === 'pcm16' ? 'audio/L16' : 'audio/wav');
    currentBlob = base64ToBlob(audioData, mime);
    document.getElementById('player').src = URL.createObjectURL(currentBlob);
    document.getElementById('downloadBtn').disabled = false;
    setMsg('生成成功');
  } catch (err) {
    console.error(err);
    setMsg(err.message || '生成失败', true);
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>
