<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mimo-v2.5-tts-voiceclone</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-4xl mx-auto p-4 space-y-4">
    <nav class="text-sm text-slate-300 flex gap-3">
      <a href="index.html" class="underline">首页</a>
      <a href="tts.html" class="underline">Built-in TTS</a>
      <a href="voicedesign.html" class="underline">VoiceDesign</a>
    </nav>

    <h1 class="text-2xl font-bold">mimo-v2.5-tts-voiceclone</h1>
    <p class="text-slate-400 text-sm">官方规则：上传 wav/mp3 样本到 audio.voice，不支持内置音色/唱歌。</p>

    <section class="bg-slate-900 border border-slate-700 rounded p-4 space-y-3">
      <input id="text" class="w-full rounded bg-slate-800 border border-slate-700 p-2" placeholder="输入要朗读的文本（assistant）" />
      <textarea id="userInstruction" class="w-full h-20 rounded bg-slate-800 border border-slate-700 p-2" placeholder="自然语言控制（可选）"></textarea>
      <input id="sample" type="file" accept=".wav,.mp3,audio/wav,audio/mpeg" class="w-full rounded bg-slate-800 border border-slate-700 p-2" />

      <select id="format" class="rounded bg-slate-800 border border-slate-700 p-2">
        <option value="wav">wav</option><option value="mp3">mp3</option><option value="pcm16">pcm16</option>
      </select>

      <button onclick="generate()" class="px-4 py-2 bg-amber-600 rounded">生成</button>
      <p id="msg" class="text-sm text-slate-400"></p>
      <audio id="player" controls class="w-full"></audio>
    </section>
  </main>

<script>
const API_URL = 'https://api.xiaomimimo.com/v1/chat/completions';
const MODEL = 'mimo-v2.5-tts-voiceclone';

function getApiKey() { return localStorage.getItem('mimo_api_key'); }
function toBlob(base64, type) {
  const b = atob(base64), arr = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) arr[i] = b.charCodeAt(i);
  return new Blob([arr], { type });
}
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('读取样本失败'));
    r.readAsDataURL(file);
  });
}

async function generate() {
  const text = document.getElementById('text').value.trim();
  const userInstruction = document.getElementById('userInstruction').value.trim();
  const format = document.getElementById('format').value;
  const file = document.getElementById('sample').files[0];
  const key = getApiKey();

  if (!key) return (document.getElementById('msg').textContent = '请先在首页保存 API Key');
  if (!text) return (document.getElementById('msg').textContent = '请输入文本');
  if (!file) return (document.getElementById('msg').textContent = '请上传 wav/mp3 样本');

  const supported = ['audio/mpeg', 'audio/mp3', 'audio/wav', 'audio/x-wav'].includes(file.type) || /\.(mp3|wav)$/i.test(file.name);
  if (!supported) return (document.getElementById('msg').textContent = '样本仅支持 wav/mp3');

  const voiceData = await readAsDataURL(file);
  const base64Data = String(voiceData).split(',')[1] || '';
  if (base64Data.length > 10 * 1024 * 1024) {
    return (document.getElementById('msg').textContent = '样本 Base64 超过 10MB');
  }

  document.getElementById('msg').textContent = '生成中...';
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'api-key': key },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: 'user', content: userInstruction || '请自然朗读以下文本' },
        { role: 'assistant', content: text }
      ],
      audio: { format, voice: voiceData }
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('msg').textContent = err.error?.message || `请求失败(${res.status})`;
    return;
  }

  const data = await res.json();
  const mime = format === 'mp3' ? 'audio/mpeg' : (format === 'pcm16' ? 'audio/L16' : 'audio/wav');
  const blob = toBlob(data.choices[0].message.audio.data, mime);
  document.getElementById('player').src = URL.createObjectURL(blob);
  document.getElementById('msg').textContent = '成功';
}
</script>
</body>
</html>
